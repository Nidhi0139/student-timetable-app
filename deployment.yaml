apiVersion: apps/v1
kind: Deployment
metadata:
  name: timetable-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: timetable

  template:
    metadata:
      labels:
        app: timetable

    spec:
      containers:
      - name: timetable
        image: nidhireddy11/timetable-app:latest
        ports:
        - containerPort: 80

---

apiVersion: v1
kind: Service
metadata:
  name: timetable-service

spec:
  type: NodePort
  selector:
    app: timetable

  ports:
    - port: 80
      targetPort: 80
      nodePort: 30007